<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看过的电影 - 洪思齐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E6CF3',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .movie-card {
            transition: all 0.3s ease;
        }
        .movie-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        .stars {
            color: #FFB800;
        }
        .badge-five-star {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-8 text-white">
            <h1 class="text-4xl md:text-5xl font-bold mb-3">🎬 看过的电影</h1>
            <p class="text-lg opacity-90">记录我看过的电影，分享观后感</p>
        </div>

        <!-- 近期观看 -->
        <div class="card p-6 md:p-8 mb-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">🎦</span> 近期观看
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="movies-watched">
                <div class="text-gray-400 text-center py-8">
                    还没有记录，请添加电影
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addMovie('watched')" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 添加看过的电影
                </button>
            </div>
        </div>

        <!-- 五星推荐 -->
        <div class="card p-6 md:p-8 mb-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">⭐</span> 五星推荐
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="movies-favorite">
                <div class="text-gray-400 text-center py-8">
                    还没有推荐电影
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addMovie('favorite')" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 添加到五星推荐
                </button>
            </div>
        </div>

        <!-- 想看 -->
        <div class="card p-6 md:p-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">📌</span> 想看
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="movies-want">
                <div class="text-gray-400 text-center py-8">
                    还没有记录，请添加电影
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addMovie('want')" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 添加到想看
                </button>
                <button onclick="clearAllData()" class="mt-3 w-full bg-danger text-white py-3 px-4 rounded-lg hover:bg-danger/90 transition-colors">
                    🗑️ 清空所有数据
                </button>
            </div>
        </div>

        <!-- 数据备份 -->
        <div class="card p-6 md:p-8 mt-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">🔐</span> 数据备份
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="exportData()" class="bg-success text-white py-3 px-4 rounded-lg hover:bg-success/90 transition-colors">
                    💾 导出加密备份
                </button>
                <label class="bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors text-center cursor-pointer">
                    📥 从备份导入
                    <input type="file" id="import-file" accept=".json,.encrypted" onchange="importData(event)" hidden>
                </label>
            </div>
            <p class="mt-4 text-sm text-gray-500">
                💡 提示：导出的备份会用密码AES加密，保存在你的云盘，即使泄露他人也无法查看。导入时需要输入相同密码才能恢复。
            </p>
        </div>
    </div>

    <script>
        const defaultData = {
            watched: [],
            favorite: [],
            want: []
        };

        let data = JSON.parse(localStorage.getItem('movieData')) || defaultData;

        function saveData() {
            localStorage.setItem('movieData', JSON.stringify(data));
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return stars;
        }

        function render() {
            renderSection('watched', data.watched);
            renderSection('favorite', data.favorite);
            renderSection('want', data.want);
        }

        function renderSection(section, movies) {
            const container = document.getElementById(`movies-${section}`);
            if (movies.length === 0) {
                if (section === 'watched') {
                    container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有记录，请添加电影</div>';
                } else if (section === 'favorite') {
                    container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有推荐电影</div>';
                } else {
                    container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有记录，请添加电影</div>';
                }
                return;
            }

            container.innerHTML = movies.map((movie, index) => {
                const badge = movie.rating === 5 ? 'badge-five-star' : 'bg-gray-100 text-gray-600';
                return `
                <div class="movie-card bg-gray-50 rounded-xl p-5 border border-gray-200">
                    <h3 class="text-xl font-bold text-dark mb-2">${movie.name}</h3>
                    <p class="text-gray-600 mb-2">年份：${movie.year || '未知'}</p>
                    ${movie.rating ? `<p class="mb-2"><span class="font-medium">评分：</span><span class="stars">${renderStars(movie.rating)}</span></p>` : ''}
                    ${movie.time ? `<p class="text-sm text-gray-500">观看时间：${movie.time}</p>` : ''}
                    ${movie.reason ? `<p class="mt-3 text-sm text-gray-600 border-t pt-3">${movie.reason}</p>` : ''}
                    ${movie.note ? `<p class="mt-2 text-sm text-gray-600">${movie.note}</p>` : ''}
                    <div class="mt-4 flex gap-2">
                        <button onclick="deleteMovie('${section}', ${index})" class="flex-1 bg-danger/10 text-danger py-2 px-3 rounded-lg hover:bg-danger/20 transition-colors text-sm">
                            删除
                        </button>
                    </div>
                    ${section !== 'favorite' && movie.rating === 5 ? `<span class="absolute top-3 right-3 px-2 py-1 rounded-full text-xs font-semibold ${badge-five-star}>五星推荐</span>` : ''}
                </div>
            `}).join('');
        }

        function addMovie(section) {
            const name = prompt('请输入电影名称：');
            if (!name) return;
            const year = prompt('请输入上映年份（可选）：');
            if (year === null) return;

            if (section === 'watched') {
                const rating = parseInt(prompt('请输入评分（1-5星）：') || '4');
                const time = prompt('观看时间（例如：2026年3月）：');
                const note = prompt('观后感（可选）：');
                data[section].push({ name, year, rating: rating || 4, time, note });
                // 如果是五星，也可以加到favorite里
                if (rating === 5 && !confirm('是否同时添加到五星推荐？')) {
                    // 不添加
                } else if (rating === 5) {
                    data.favorite.push({ name, year, rating: 5, reason: note });
                }
            } else if (section === 'favorite') {
                const reason = prompt('推荐理由：');
                data[section].push({ name, year, reason });
            } else {
                const reason = prompt('为什么想看（可选）：');
                data[section].push({ name, year, reason });
            }

            saveData();
            render();
        }

        function deleteMovie(section, index) {
            if (!confirm('确定要删除这部电影吗？')) return;
            data[section].splice(index, 1);
            saveData();
            render();
        }

        function clearAllData() {
            if (!confirm('⚠️ 确定要清空所有电影数据吗？无法恢复！')) return;
            if (confirm('再次确认：真的要清空吗？')) {
                localStorage.removeItem('movieData');
                data = JSON.parse(JSON.stringify(defaultData));
                saveData();
                render();
            }
        }

        function exportData() {
            const password = prompt('请设置备份密码（请记住，导入时需要）：');
            if (!password) return;
            
            const allData = {
                movies: data,
                exportTime: new Date().toISOString(),
                version: 1
            };
            
            const jsonStr = JSON.stringify(allData);
            const encrypted = CryptoJS.AES.encrypt(jsonStr, password).toString();
            
            // Download
            const blob = new Blob([encrypted], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `movies-backup-${new Date().toISOString().slice(0, 10)}.encrypted`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 备份导出成功！请保存好这个加密文件，记住密码。');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const encrypted = e.target.result;
                const password = prompt('请输入备份密码：');
                if (!password) return;
                
                try {
                    const decrypted = CryptoJS.AES.decrypt(encrypted, password).toString(CryptoJS.enc.Utf8);
                    const allData = JSON.parse(decrypted);
                    
                    if (!allData.movies) {
                        alert('❌ 备份文件格式不正确');
                        return;
                    }
                    
                    if (!confirm(`确定要导入吗？这会覆盖当前所有数据！`)) return;
                    
                    data = allData.movies;
                    saveData();
                    render();
                    alert('✅ 导入成功！数据已恢复。');
                } catch (err) {
                    alert('❌ 导入失败：密码错误或文件损坏');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        render();
    </script>
</body>
</html>
