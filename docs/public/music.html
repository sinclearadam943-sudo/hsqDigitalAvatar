<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜欢的音乐 - 洪思齐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E6CF3',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .music-card {
            transition: all 0.3s ease;
        }
        .music-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        .stars {
            color: #FFB800;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-8 text-white">
            <h1 class="text-4xl md:text-5xl font-bold mb-3">🎵 喜欢的音乐</h1>
            <p class="text-lg opacity-90">记录我喜欢的音乐，分享好听的歌</p>
        </div>

        <!-- 常听的歌 -->
        <div class="card p-6 md:p-8 mb-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">🎶</span> 常听的歌
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="songs">
                <div class="text-gray-400 text-center py-8">
                    还没有记录，请添加歌曲
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addSong()" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 添加歌曲
                </button>
            </div>
        </div>

        <!-- 喜欢的专辑 -->
        <div class="card p-6 md:p-8 mb-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">💿</span> 喜欢的专辑
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="albums">
                <div class="text-gray-400 text-center py-8">
                    还没有记录，请添加专辑
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addAlbum()" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 添加专辑
                </button>
            </div>
        </div>

        <!-- 歌单 -->
        <div class="card p-6 md:p-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">📀</span> 我的歌单
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="playlists">
                <div class="text-gray-400 text-center py-8">
                    还没有创建歌单
                </div>
            </div>
            <div class="mt-6 pt-4 border-t">
                <button onclick="addPlaylist()" class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                    ➕ 创建歌单
                </button>
                <button onclick="clearAllData()" class="mt-3 w-full bg-danger text-white py-3 px-4 rounded-lg hover:bg-danger/90 transition-colors">
                    🗑️ 清空所有数据
                </button>
            </div>
        </div>

        <!-- 数据备份 -->
        <div class="card p-6 md:p-8 mt-8">
            <h2 class="text-2xl font-bold text-dark mb-6 flex items-center">
                <span class="mr-3">🔐</span> 数据备份
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="exportData()" class="bg-success text-white py-3 px-4 rounded-lg hover:bg-success/90 transition-colors">
                    💾 导出加密备份
                </button>
                <label class="bg-primary text-white py-3 px-4 rounded-lg hover:bg-primary/90 transition-colors text-center cursor-pointer">
                    📥 从备份导入
                    <input type="file" id="import-file" accept=".json,.encrypted" onchange="importData(event)" hidden>
                </label>
            </div>
            <p class="mt-4 text-sm text-gray-500">
                💡 提示：导出的备份会用密码AES加密，保存在你的云盘，即使泄露他人也无法查看。导入时需要输入相同密码才能恢复。
            </p>
        </div>
    </div>

    <script>
        const defaultData = {
            songs: [],
            albums: [],
            playlists: []
        };

        let data = JSON.parse(localStorage.getItem('musicData')) || defaultData;

        function saveData() {
            localStorage.setItem('musicData', JSON.stringify(data));
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return stars;
        }

        function render() {
            renderSongs();
            renderAlbums();
            renderPlaylists();
        }

        function renderSongs() {
            const container = document.getElementById('songs');
            if (data.songs.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有记录，请添加歌曲</div>';
                return;
            }
            container.innerHTML = data.songs.map((song, index) => `
                <div class="music-card bg-gray-50 rounded-xl p-5 border border-gray-200">
                    <h3 class="text-xl font-bold text-dark mb-2">${song.name}</h3>
                    <p class="text-gray-600 mb-2">歌手：${song.artist}</p>
                    <p class="text-gray-600 mb-2">风格：${song.genre || '未分类'}</p>
                    ${song.rating ? `<p class="mb-2"><span class="font-medium">推荐：</span><span class="stars">${renderStars(song.rating)}</span></p>` : ''}
                    ${song.note ? `<p class="mt-3 text-sm text-gray-600 border-t pt-3">${song.note}</p>` : ''}
                    <div class="mt-4 flex gap-2">
                        <button onclick="deleteSong(${index})" class="flex-1 bg-danger/10 text-danger py-2 px-3 rounded-lg hover:bg-danger/20 transition-colors text-sm">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderAlbums() {
            const container = document.getElementById('albums');
            if (data.albums.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有记录，请添加专辑</div>';
                return;
            }
            container.innerHTML = data.albums.map((album, index) => `
                <div class="music-card bg-gray-50 rounded-xl p-5 border border-gray-200">
                    <h3 class="text-xl font-bold text-dark mb-2">${album.name}</h3>
                    <p class="text-gray-600 mb-2">歌手：${album.artist}</p>
                    <p class="text-gray-600 mb-2">发行：${album.year || '未知'}</p>
                    ${album.recommend ? `<p class="mb-2"><span class="font-medium">推荐歌曲：</span>${album.recommend}</p>` : ''}
                    <div class="mt-4 flex gap-2">
                        <button onclick="deleteAlbum(${index})" class="flex-1 bg-danger/10 text-danger py-2 px-3 rounded-lg hover:bg-danger/20 transition-colors text-sm">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderPlaylists() {
            const container = document.getElementById('playlists');
            if (data.playlists.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center py-8">还没有创建歌单</div>';
                return;
            }
            container.innerHTML = data.playlists.map((playlist, index) => `
                <div class="music-card bg-gray-50 rounded-xl p-5 border border-gray-200">
                    <h3 class="text-xl font-bold text-dark mb-3">${playlist.name}</h3>
                    <ul class="space-y-2 mb-4">
                        ${playlist.songs.filter(s => s.trim()).map(song => `<li class="text-gray-600">• ${song}</li>`).join('')}
                    </ul>
                    ${playlist.description ? `<p class="text-sm text-gray-500 mb-4">${playlist.description}</p>` : ''}
                    <div class="mt-4 flex gap-2">
                        <button onclick="deletePlaylist(${index})" class="flex-1 bg-danger/10 text-danger py-2 px-3 rounded-lg hover:bg-danger/20 transition-colors text-sm">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addSong() {
            const name = prompt('请输入歌曲名称：');
            if (!name) return;
            const artist = prompt('请输入歌手名称：');
            if (artist === null) return;
            const genre = prompt('请输入音乐风格（可选）：');
            const rating = parseInt(prompt('请输入推荐评分（1-5）：') || '5');
            const note = prompt('备注（可选）：');
            data.songs.push({ name, artist, genre, rating: rating || 5, note });
            saveData();
            render();
        }

        function addAlbum() {
            const name = prompt('请输入专辑名称：');
            if (!name) return;
            const artist = prompt('请输入歌手名称：');
            if (artist === null) return;
            const year = prompt('发行年份（可选）：');
            const recommend = prompt('推荐歌曲（逗号分隔，可选）：');
            data.albums.push({ name, artist, year, recommend });
            saveData();
            render();
        }

        function addPlaylist() {
            const name = prompt('请输入歌单名称：');
            if (!name) return;
            const description = prompt('歌单描述（可选）：');
            const songsStr = prompt('请输入歌曲列表，每行一首歌曲（格式：歌名 - 歌手）：');
            if (!songsStr) return;
            const songs = songsStr.split('\n');
            data.playlists.push({ name, description, songs });
            saveData();
            render();
        }

        function deleteSong(index) {
            if (!confirm('确定要删除这首歌吗？')) return;
            data.songs.splice(index, 1);
            saveData();
            render();
        }

        function deleteAlbum(index) {
            if (!confirm('确定要删除这张专辑吗？')) return;
            data.albums.splice(index, 1);
            saveData();
            render();
        }

        function deletePlaylist(index) {
            if (!confirm('确定要删除这个歌单吗？')) return;
            data.playlists.splice(index, 1);
            saveData();
            render();
        }

        function clearAllData() {
            if (!confirm('⚠️ 确定要清空所有音乐数据吗？无法恢复！')) return;
            if (confirm('再次确认：真的要清空吗？')) {
                localStorage.removeItem('musicData');
                data = JSON.parse(JSON.stringify(defaultData));
                saveData();
                render();
            }
        }

        function exportData() {
            const password = prompt('请设置备份密码（请记住，导入时需要）：');
            if (!password) return;
            
            const allData = {
                music: data,
                exportTime: new Date().toISOString(),
                version: 1
            };
            
            const jsonStr = JSON.stringify(allData);
            const encrypted = CryptoJS.AES.encrypt(jsonStr, password).toString();
            
            // Download
            const blob = new Blob([encrypted], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `music-backup-${new Date().toISOString().slice(0, 10)}.encrypted`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 备份导出成功！请保存好这个加密文件，记住密码。');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const encrypted = e.target.result;
                const password = prompt('请输入备份密码：');
                if (!password) return;
                
                try {
                    const decrypted = CryptoJS.AES.decrypt(encrypted, password).toString(CryptoJS.enc.Utf8);
                    const allData = JSON.parse(decrypted);
                    
                    if (!allData.music) {
                        alert('❌ 备份文件格式不正确');
                        return;
                    }
                    
                    if (!confirm(`确定要导入吗？这会覆盖当前所有数据！`)) return;
                    
                    data = allData.music;
                    saveData();
                    render();
                    alert('✅ 导入成功！数据已恢复。');
                } catch (err) {
                    alert('❌ 导入失败：密码错误或文件损坏');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        render();
    </script>
</body>
</html>
