# No need for action deployment, just enable GitHub Pages from main branch with /docs/.vitepress/dist
# This project is fully static, you can enable it manually:
# 1. Go to Settings → Pages
# 2. Source → Deploy from a branch
# 3. Select main branch, folder /docs/.vitepress/dist
# 4. Save
name: Build and check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm docs:build
